pluginManagement {
    repositories {
        mavenCentral()
        gradlePluginPortal()
        google()
    }
    resolutionStrategy {
        eachPlugin {
            switch (requested.id.id) {
                case "com.android.library":
                    useVersion("8.11.0")
                    break
                case "org.jetbrains.kotlin.android":
                    useVersion("1.9.25")
                    break
            }
        }
    }
}

dependencyResolutionManagement {
    repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
    repositories {
        mavenCentral()
        google()
    }
}

include ':tauri-android'
// Use the real Tauri Android SDK when present (generated by tauri android build).
// Fall back to the committed stub for CI and development environments where
// tauri android build has not been run.
def tauriApiDir = new File(rootProject.projectDir, '.tauri/tauri-api')
def tauriApiStub = new File(rootProject.projectDir, 'tauri-android-stub')
project(':tauri-android').projectDir =
    (tauriApiDir.exists() && new File(tauriApiDir, 'build.gradle.kts').exists())
        ? tauriApiDir
        : tauriApiStub
